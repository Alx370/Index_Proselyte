<main class="home-shell">
    <app-header></app-header>

    @if (!hasName()) {
        <section class="panel" aria-labelledby="identity-title">
            <h2 id="identity-title">Who are you?</h2>
            <form [formGroup]="nameForm" (ngSubmit)="registerName()">
                <label for="name">Insert your name</label>
                <input id="name" type="text" formControlName="name"
                       [attr.aria-invalid]="nameForm.controls.name.invalid && nameForm.controls.name.touched"
                       aria-describedby="name-error" />
                @if (nameForm.controls.name.errors?.['pattern']) {
                    <span id="name-error" role="alert">Nome contiene caratteri non validi.</span>
                }
                <button type="submit">REGISTER</button>
            </form>
        </section>
    } @else {
        <section class="panel" aria-live="polite">
            <p class="to-line">To {{ savedName() }}</p>
            <p class="greeting">{{ greeting() }}</p>
            <div class="actions">
                <button type="button" (click)="clearName()">Change your name</button>
                <button type="button" (click)="drawPrescript()">Draw a Prescript</button>
            </div>
        </section>
    }

    <app-footer></app-footer>
</main>
