<main class="prescript-shell">
    <div id="prescriptMessenger">
        <div id="paperSlipName">
            <p>{{ NamePrefix() }}</p>
        </div>

        <div id="prescriptText">
            <p></p>
        </div>

        <div class="prescript-actions">
            <button type="button" (click)="clearPrescript()">Prescript Complete</button>
            <button type="button" (click)="newPrescriptDisplay()">Draw Prescript</button>
        </div>
    </div>

    <div class="footer-area">
        <div class="footer-divider"></div>
        <app-footer></app-footer>
    </div>
</main>
