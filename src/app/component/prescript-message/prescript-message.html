<main class="prescript-shell">
    <div id="prescriptMessenger">
        <div id="paperSlipName">
            <p>{{ namePrefix() }}</p>
        </div>

        <div id="prescriptText">
            <p>{{ prescriptText() }}</p>
        </div>

        <div class="prescript-actions">
            @if (isCleared()) {
                <button type="button" (click)="newPrescriptDisplay()">Draw a Prescript</button>
            } @else if (prescriptText()) {
                <button type="button" (click)="clearPrescript()" [disabled]="isTyping()">Prescript Complete</button>
            } @else {
                <button type="button" (click)="newPrescriptDisplay()">Draw a Prescript</button>
            }
        </div>
    </div>

        <div class="footer-area">
            <div class="footer-divider"></div>
            <app-footer></app-footer>
        </div>
</main>
